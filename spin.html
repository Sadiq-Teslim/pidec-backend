<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNILAG Food Spinner</title>
    <style>
        /* CSS Reset & Variables */
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --text-dark: #1F2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
        }

        .header p {
            color: #4B5563;
            font-size: 1.1rem;
            margin-top: 5px;
        }

        /* Wheel Container */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .wheel-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.15));
        }

        /* The Pointer / Arrow */
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #EF4444; /* Red arrow */
            z-index: 10;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
        }

        canvas {
            width: 100%;
            max-width: 450px;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
        }

        /* Spin Button */
        button.spin-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 48px;
            font-size: 1.5rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button.spin-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 25px rgba(79, 70, 229, 0.4);
        }

        button.spin-btn:active {
            transform: translateY(2px) scale(0.98);
            box-shadow: 0 5px 10px rgba(79, 70, 229, 0.3);
        }

        button.spin-btn:disabled {
            background: #9CA3AF;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Modal / Popup */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            z-index: 100;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        .modal-card h2 {
            font-size: 1.8rem;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .modal-card p {
            color: #6B7280;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .modal-card .result-highlight {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 30px;
            line-height: 1.2;
        }

        .modal-card button.close-btn {
            background: #10B981;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        .modal-card button.close-btn:hover {
            background: #059669;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>UNILAG Food Roulette</h1>
        <p>Can't decide what to eat? Let the wheel choose!</p>
    </div>

    <div class="game-container">
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="600" height="600"></canvas>
        </div>
        <button id="spinBtn" class="spin-btn">Spin The Wheel</button>
    </div>

    <!-- Result Popup -->
    <div class="modal-overlay" id="resultModal">
        <div class="modal-card">
            <h2>🎉 Dinner Decided! 🎉</h2>
            <p>Looks like you're heading to...</p>
            <div class="result-highlight" id="resultText">Jaja</div>
            <button class="close-btn" id="closeBtn">Awesome, let's go!</button>
        </div>
    </div>

    <script>
        // --- Configuration ---
        const slices = [
            "Jaja", 
            "New Hall Amala", 
            "Korede Spaghetti", 
            "Faculty of Arts", 
            "Cook Indomie"
        ];
        
        // Vibrant modern color palette
        const colors = [
            "#FF595E", // Red
            "#FFCA3A", // Yellow
            "#8AC926", // Green
            "#1982C4", // Blue
            "#6A4C93"  // Purple
        ];

        // --- DOM Elements ---
        const canvas = document.getElementById("wheelCanvas");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        const modal = document.getElementById("resultModal");
        const closeBtn = document.getElementById("closeBtn");
        const resultText = document.getElementById("resultText");

        // --- Wheel Variables ---
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = Math.min(centerX, centerY) - 10;
        const arc = (2 * Math.PI) / slices.length;
        
        let currentAngle = 0;
        let isSpinning = false;

        // --- Draw the Wheel ---
        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < slices.length; i++) {
                const angle = currentAngle + i * arc;

                // Draw Slice
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + arc, false);
                ctx.lineTo(centerX, centerY);
                ctx.fill();

                // Draw Slice Borders
                ctx.lineWidth = 4;
                ctx.strokeStyle = "#ffffff";
                ctx.stroke();

                // Draw Text
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 26px system-ui, sans-serif";
                
                // Add a slight text shadow for readability
                ctx.shadowColor = "rgba(0, 0, 0, 0.4)";
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;

                // Draw the text slightly away from the outer edge
                ctx.fillText(slices[i], radius - 30, 8);
                ctx.restore();
            }

            // Draw Center Hub
            ctx.beginPath();
            ctx.fillStyle = "#ffffff";
            ctx.arc(centerX, centerY, 40, 0, 2 * Math.PI);
            ctx.fill();
            ctx.lineWidth = 5;
            ctx.strokeStyle = "#e5e7eb";
            ctx.stroke();
        }

        // --- Spin Logic & Animation ---
        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            spinBtn.disabled = true;

            // Randomize spin length
            const spinDuration = 5000; // 5 seconds
            const startAngle = currentAngle;
            // Spin between 6 and 10 full rotations + random offset
            const spins = (Math.floor(Math.random() * 5) + 6) * Math.PI * 2;
            const randomExtraAngle = Math.random() * Math.PI * 2;
            const targetAngle = startAngle + spins + randomExtraAngle;

            let startTime = null;

            // Easing function: easeOutQuart (starts fast, slows down smoothly)
            function easeOutQuart(x) {
                return 1 - Math.pow(1 - x, 4);
            }

            function animate(currentTime) {
                if (!startTime) startTime = currentTime;
                const elapsed = currentTime - startTime;
                let progress = Math.min(elapsed / spinDuration, 1);
                
                const easeProgress = easeOutQuart(progress);
                currentAngle = startAngle + (targetAngle - startAngle) * easeProgress;

                drawWheel();

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    spinBtn.disabled = false;
                    determineWinner();
                }
            }

            requestAnimationFrame(animate);
        }

        // --- Determine Winner ---
        function determineWinner() {
            // Pointer is exactly at the top (270 degrees or 1.5 * PI)
            const topAngle = 1.5 * Math.PI;
            
            // Normalize currentAngle to be within 0 and 2*PI
            const normalizedAngle = currentAngle % (2 * Math.PI);
            
            // Calculate relative offset to the pointer
            let offset = (topAngle - normalizedAngle) % (2 * Math.PI);
            if (offset < 0) offset += 2 * Math.PI;

            // Figure out which slice index covers this offset
            const winningIndex = Math.floor(offset / arc);
            const winner = slices[winningIndex];

            showModal(winner);
        }

        // --- Modal Control ---
        function showModal(winnerText) {
            resultText.innerText = winnerText;
            modal.classList.add("active");
        }

        function closeModal() {
            modal.classList.remove("active");
        }

        // --- Event Listeners ---
        spinBtn.addEventListener("click", spin);
        closeBtn.addEventListener("click", closeModal);

        // Initial render
        drawWheel();
    </script>
</body>
</html>
